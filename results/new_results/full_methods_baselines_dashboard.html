<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Debiasing Results Dashboard</title>
  <style>
    :root {
      --bg: #f2f6fa;
      --panel: #fbfdff;
      --ink: #1c2b36;
      --muted: #607481;
      --line: #d7e2ea;
      --accent: #1a7e6a;
      --accent-2: #2b8f7c;
      --shadow: 0 8px 24px rgba(9, 26, 39, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, #dff3ff 0%, transparent 34%),
        radial-gradient(circle at 100% 18%, #e7f5e7 0%, transparent 28%),
        linear-gradient(180deg, #f9fbfe 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1920px;
      margin: 0 auto;
      padding: 14px 12px 16px;
    }

    .title {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 4px 0 10px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .controls {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="text"], select {
      width: 100%;
      border: 1px solid #c8d7dc;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.82rem;
      color: var(--ink);
      background: #fff;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      min-height: 30px;
    }

    .chip {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      border: 1px solid #c8d7dc;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.8rem;
      background: #f8fbfb;
    }

    .chip input { margin: 0; }

    .button {
      border: 1px solid #0a615a;
      background: linear-gradient(180deg, #149086 0%, #0f766e 100%);
      color: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      width: fit-content;
    }

    .button:active { transform: translateY(1px); }

    .meta {
      margin: 6px 2px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .legend {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 3px 8px;
      white-space: nowrap;
    }

    .swatch {
      width: 16px;
      height: 10px;
      border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: auto;
      box-shadow: var(--shadow);
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      min-width: 1080px;
      width: 100%;
      font-size: 0.72rem;
      table-layout: fixed;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #ecf3fb;
      z-index: 2;
      border-bottom: 1px solid var(--line);
      color: #15333f;
      text-align: right;
      cursor: pointer;
      user-select: none;
      font-size: 0.68rem;
      line-height: 1.1;
      white-space: normal;
      word-break: break-word;
    }

    th, td {
      padding: 4px 6px;
      border-right: 1px solid #e4ecef;
      border-bottom: 1px solid #edf2f4;
      white-space: nowrap;
    }

    td {
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th:nth-child(1), th:nth-child(2), td:nth-child(1), td:nth-child(2) {
      text-align: left;
    }

    tbody tr:hover td {
      background-image: linear-gradient(0deg, rgba(8, 47, 73, 0.05), rgba(8, 47, 73, 0.05));
    }

    th:nth-child(1), td:nth-child(1), th:nth-child(2), td:nth-child(2) {
      position: sticky;
      left: 0;
      z-index: 1;
      background-clip: padding-box;
    }

    th:nth-child(2), td:nth-child(2) {
      left: 66px;
    }

    th:nth-child(1), td:nth-child(1) { min-width: 66px; max-width: 66px; width: 66px; }
    th:nth-child(2), td:nth-child(2) { min-width: 186px; max-width: 186px; width: 186px; }
    th:nth-child(n+3), td:nth-child(n+3) { min-width: 74px; max-width: 74px; width: 74px; }

    thead th:nth-child(1), thead th:nth-child(2) {
      z-index: 3;
      background: #e5eff2;
    }

    td.dim {
      color: #90a2ad;
      background: #f4f7fb;
    }

    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 6px;
      padding: 1px 7px;
      border-radius: 999px;
      font-size: 0.62rem;
      font-weight: 800;
      color: #16303a;
      border: 1px solid rgba(20, 46, 58, 0.15);
    }

    .rank.rank-method {
      background: #d9f1e4;
      border-color: #8ec9ab;
    }

    .rank.rank-baseline {
      background: #dbeafe;
      border-color: #97b8e6;
    }

    .hint {
      color: #6f8491;
      font-size: 0.7rem;
      line-height: 1.25;
    }

    @media (max-width: 780px) {
      .wrap { padding: 14px 10px 18px; }
      .title { font-size: 1.25rem; }
      .controls { grid-template-columns: 1fr; }
      table { font-size: 0.72rem; min-width: 980px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">Debiasing Results Dashboard</h1>
    <p class="subtitle">Interactive view of methods vs baselines across all available datasets and metrics.</p>

    <section class="controls" aria-label="Filters and sorting">
      <div class="control">
        <label for="search">Search Name</label>
        <input id="search" type="text" placeholder="Filter rows by name..." />
      </div>

      <div class="control">
        <label>Row Type</label>
        <div class="row">
          <label class="chip"><input id="showMethods" type="checkbox" checked />Methods</label>
          <label class="chip"><input id="showBaselines" type="checkbox" checked />Baselines</label>
        </div>
      </div>

      <div class="control">
        <label for="sortCol">Sort Column</label>
        <select id="sortCol"></select>
      </div>

      <div class="control">
        <label for="focusCol">Global Rank Metric</label>
        <select id="focusCol"></select>
        <div id="rankHelp" class="hint">Shows rank # across methods + baselines for the selected metric (missing values are not ranked).</div>
      </div>

      <div class="control">
        <label>Sort Direction</label>
        <button id="sortDir" class="button" type="button">Descending</button>
      </div>
    </section>

    <div class="meta">
      <div id="countInfo"></div>
      <div class="legend">
        <span class="swatch" style="background:#dc9a97"></span><span>Worse</span>
        <span class="swatch" style="background:#f5f3ed"></span><span>Middle</span>
        <span class="swatch" style="background:#85b79b"></span><span>Better</span>
        <span id="legendNote"></span>
      </div>
    </div>

    <div class="table-wrap">
      <table id="tbl"></table>
    </div>
  </div>

  <script>
    const rawCsv = document.getElementById("csv-data").textContent.trim();

    function parseCsv(text) {
      const lines = text.split(/\r?\n/).filter(Boolean);
      const rows = [];
      for (const line of lines) {
        const out = [];
        let cur = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            if (inQuotes && line[i + 1] === '"') {
              cur += '"';
              i++;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (ch === ',' && !inQuotes) {
            out.push(cur);
            cur = "";
          } else {
            cur += ch;
          }
        }
        out.push(cur);
        rows.push(out);
      }
      return rows;
    }

    function toNum(v) {
      if (v == null) return null;
      const t = String(v).trim();
      if (!t || t === "--") return null;
      const n = Number(t);
      return Number.isFinite(n) ? n : null;
    }

    function fmt(v) {
      const n = toNum(v);
      if (n == null) return "--";
      return Number(n.toFixed(4)).toString();
    }

    const parsed = parseCsv(rawCsv);
    const headers = parsed[0];
    const records = parsed.slice(1).map((r) => {
      const obj = {};
      headers.forEach((h, i) => {
        obj[h] = (r[i] || "").trim();
      });
      return obj;
    });

    const numericCols = headers.filter((h) => !["type", "name"].includes(h));
    const metricMeta = {
      crowspairs_metric_score: { direction: "target50", note: "Best near 50" },
      stereoset_icat_overall: { direction: "higher", note: "Higher is better" },
      bbq_mean_abs_bias_disambig: { direction: "lower", note: "Lower is better" },
      bold_toxicity_prop: { direction: "lower", note: "Lower is better" },
      honest_score: { direction: "lower", note: "Lower is better" },
      winobias_abs_pro_anti_gap: { direction: "lower", note: "Lower is better" },
      winogender_mean_abs_occupation_gender_bias_score: { direction: "lower", note: "Lower is better" },
      bias_in_bios_mean_abs_tpr_gap: { direction: "lower", note: "Lower is better" },
      unqover_gender_mu_bias_intensity: { direction: "lower", note: "Lower is better" },
      unqover_race_mu_bias_intensity: { direction: "lower", note: "Lower is better" },
      unqover_religion_mu_bias_intensity: { direction: "lower", note: "Lower is better" },
      unqover_nationality_mu_bias_intensity: { direction: "lower", note: "Lower is better" }
    };

    function directionFor(col) {
      if (metricMeta[col]) return metricMeta[col].direction;
      if (col.includes("icat") || col.includes("accuracy")) return "higher";
      return "lower";
    }

    const colStats = {};
    for (const col of numericCols) {
      const vals = records.map((r) => toNum(r[col])).filter((v) => v != null);
      if (!vals.length) {
        colStats[col] = null;
        continue;
      }
      const min = Math.min(...vals);
      const max = Math.max(...vals);
      const maxDist50 = Math.max(...vals.map((v) => Math.abs(v - 50))) || 1;
      colStats[col] = { min, max, maxDist50 };
    }

    const baseRow = records.find((r) => r.type === "baseline" && r.name === "llama_8b_base") || null;

    function relativeDelta(col, value, baseVal) {
      const dir = directionFor(col);
      if (dir === "higher") return value - baseVal;
      if (dir === "target50") return Math.abs(baseVal - 50) - Math.abs(value - 50);
      return baseVal - value;
    }

    const baseColStats = {};
    for (const col of numericCols) {
      const baseVal = baseRow ? toNum(baseRow[col]) : null;
      if (baseVal == null) {
        baseColStats[col] = { baseVal: null, posMax: 0, negMin: 0 };
        continue;
      }
      let posMax = 0;
      let negMin = 0;
      for (const r of records) {
        const v = toNum(r[col]);
        if (v == null) continue;
        const d = relativeDelta(col, v, baseVal);
        if (d > posMax) posMax = d;
        if (d < negMin) negMin = d;
      }
      baseColStats[col] = { baseVal, posMax, negMin };
    }

    let state = {
      showMethods: true,
      showBaselines: true,
      search: "",
      sortCol: "__rank__",
      sortDir: "asc",
      focusCol: "stereoset_icat_overall"
    };

    const els = {
      search: document.getElementById("search"),
      showMethods: document.getElementById("showMethods"),
      showBaselines: document.getElementById("showBaselines"),
      sortCol: document.getElementById("sortCol"),
      sortDir: document.getElementById("sortDir"),
      focusCol: document.getElementById("focusCol"),
      rankHelp: document.getElementById("rankHelp"),
      tbl: document.getElementById("tbl"),
      countInfo: document.getElementById("countInfo"),
      legendNote: document.getElementById("legendNote")
    };

    function addOptions(selectEl, cols, includeDefault = false) {
      if (includeDefault) {
        const o = document.createElement("option");
        o.value = "";
        o.textContent = "(none)";
        selectEl.appendChild(o);
      }
      for (const h of cols) {
        const o = document.createElement("option");
        o.value = h;
        o.textContent = h;
        selectEl.appendChild(o);
      }
    }

    const rankSortOption = document.createElement("option");
    rankSortOption.value = "__rank__";
    rankSortOption.textContent = "global_rank (selected metric)";
    els.sortCol.appendChild(rankSortOption);
    addOptions(els.sortCol, headers);
    addOptions(els.focusCol, numericCols);
    els.sortCol.value = state.sortCol;
    els.sortDir.textContent = state.sortDir === "desc" ? "Descending" : "Ascending";
    if (numericCols.includes(state.focusCol)) {
      els.focusCol.value = state.focusCol;
    } else if (numericCols.length) {
      state.focusCol = numericCols[0];
      els.focusCol.value = state.focusCol;
    }

    function metricScore(col, value) {
      const stats = colStats[col];
      if (stats == null || value == null) return null;

      // Default behavior: color relative to base model (llama_8b_base) when available.
      const bstats = baseColStats[col];
      if (bstats && bstats.baseVal != null) {
        const delta = relativeDelta(col, value, bstats.baseVal);
        if (Math.abs(delta) < 1e-12) return 0.5;
        if (delta > 0) {
          const denom = bstats.posMax > 0 ? bstats.posMax : Math.abs(delta);
          return 0.5 + 0.5 * Math.min(1, delta / (denom || 1));
        }
        const denom = bstats.negMin < 0 ? Math.abs(bstats.negMin) : Math.abs(delta);
        return 0.5 - 0.5 * Math.min(1, Math.abs(delta) / (denom || 1));
      }

      // Fallback: global min/max scaling when base metric is unavailable.
      const dir = directionFor(col);
      if (dir === "higher") {
        const denom = stats.max - stats.min || 1;
        return (value - stats.min) / denom;
      }
      if (dir === "target50") {
        const d = Math.abs(value - 50);
        return 1 - Math.min(1, d / (stats.maxDist50 || 1));
      }
      const denom = stats.max - stats.min || 1;
      return 1 - (value - stats.min) / denom;
    }

    function colorFor(col, rawValue) {
      const value = toNum(rawValue);
      if (value == null) return "#f4f7fb";
      const score = metricScore(col, value);
      const hue = 8 + (128 * score);
      const sat = 40;
      const light = 95 - (25 * score);
      return `hsl(${hue}, ${sat}%, ${light}%)`;
    }

    function getGlobalRanks(rows, col) {
      const dir = directionFor(col);
      const scored = rows
        .map((r) => ({ key: `${r.type}::${r.name}`, val: toNum(r[col]) }))
        .filter((r) => r.val != null);
      scored.sort((a, b) => {
        if (dir === "higher") return b.val - a.val;
        if (dir === "target50") return Math.abs(a.val - 50) - Math.abs(b.val - 50);
        return a.val - b.val;
      });
      const map = new Map();
      scored.forEach((r, idx) => map.set(r.key, idx + 1));
      return map;
    }

    function filteredRows() {
      return records.filter((r) => {
        if (!state.showMethods && r.type === "method") return false;
        if (!state.showBaselines && r.type === "baseline") return false;
        if (state.search && !(`${r.type} ${r.name}`.toLowerCase().includes(state.search))) return false;
        return true;
      });
    }

    function compareRows(a, b, col, dir, rankMap) {
      if (col === "__rank__") {
        const aKey = `${a.type}::${a.name}`;
        const bKey = `${b.type}::${b.name}`;
        const ar = rankMap.has(aKey) ? rankMap.get(aKey) : null;
        const br = rankMap.has(bKey) ? rankMap.get(bKey) : null;
        let cmp = 0;
        if (ar != null || br != null) {
          if (ar == null) cmp = 1;
          else if (br == null) cmp = -1;
          else cmp = ar - br;
        } else {
          cmp = String(a.name).localeCompare(String(b.name));
        }
        return dir === "asc" ? cmp : -cmp;
      }
      const av = (a[col] === undefined || a[col] === null) ? "" : a[col];
      const bv = (b[col] === undefined || b[col] === null) ? "" : b[col];
      const an = toNum(av);
      const bn = toNum(bv);
      let cmp = 0;
      if (an != null || bn != null) {
        if (an == null) cmp = 1;
        else if (bn == null) cmp = -1;
        else cmp = an - bn;
      } else {
        cmp = String(av).localeCompare(String(bv));
      }
      return dir === "asc" ? cmp : -cmp;
    }

    function render() {
      const focus = state.focusCol;
      const rankMap = getGlobalRanks(records, focus);
      const totalRanked = rankMap.size;
      const rows = filteredRows();
      rows.sort((a, b) => compareRows(a, b, state.sortCol, state.sortDir, rankMap));

      const methodCount = rows.filter((r) => r.type === "method").length;
      const baselineCount = rows.filter((r) => r.type === "baseline").length;
      els.countInfo.textContent = `Showing ${rows.length} rows (${methodCount} methods, ${baselineCount} baselines)`;

      const note = (metricMeta[focus] && metricMeta[focus].note) || (directionFor(focus) === "higher" ? "Higher is better" : "Lower is better");
      els.legendNote.textContent = `| ${focus}: ${note} | colors vs llama_8b_base`;
      els.rankHelp.textContent = `Shows rank # across methods + baselines for "${focus}" (missing values are not ranked).`;

      const headCells = headers.map((h) => {
        const arrow = h === state.sortCol ? (state.sortDir === "asc" ? " \u2191" : " \u2193") : "";
        return `<th data-col="${h}">${h}${arrow}</th>`;
      }).join("");

      const bodyRows = rows.map((r) => {
        const cells = headers.map((h) => {
          if (h === "type") return `<td>${r[h]}</td>`;
          if (h === "name") {
            const rowKey = `${r.type}::${r.name}`;
            const rankClass = r.type === "baseline" ? "rank-baseline" : "rank-method";
            const rank = rankMap.has(rowKey)
              ? `<span class=\"rank ${rankClass}\">#${rankMap.get(rowKey)}</span>`
              : "";
            return `<td>${r[h]}${rank}</td>`;
          }
          const v = r[h];
          const n = toNum(v);
          if (n == null) return `<td class="dim">--</td>`;
          const bg = colorFor(h, v);
          return `<td style="background:${bg}">${fmt(v)}</td>`;
        }).join("");
        return `<tr>${cells}</tr>`;
      }).join("");

      els.tbl.innerHTML = `<thead><tr>${headCells}</tr></thead><tbody>${bodyRows}</tbody>`;

      els.tbl.querySelectorAll("th").forEach((th) => {
        th.addEventListener("click", () => {
          const col = th.getAttribute("data-col");
          if (state.sortCol === col) {
            state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
          } else {
            state.sortCol = col;
            state.sortDir = "desc";
          }
          els.sortCol.value = state.sortCol;
          els.sortDir.textContent = state.sortDir === "desc" ? "Descending" : "Ascending";
          render();
        });
      });
    }

    els.search.addEventListener("input", (e) => {
      state.search = e.target.value.trim().toLowerCase();
      render();
    });

    els.showMethods.addEventListener("change", (e) => {
      state.showMethods = e.target.checked;
      render();
    });

    els.showBaselines.addEventListener("change", (e) => {
      state.showBaselines = e.target.checked;
      render();
    });

    els.sortCol.addEventListener("change", (e) => {
      state.sortCol = e.target.value;
      render();
    });

    els.focusCol.addEventListener("change", (e) => {
      state.focusCol = e.target.value;
      render();
    });

    els.sortDir.addEventListener("click", () => {
      state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
      els.sortDir.textContent = state.sortDir === "desc" ? "Descending" : "Ascending";
      render();
    });

    render();
  </script>
</body>
</html>
